<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>答而有据 - Chat</title>

<style>
body { margin:0; font-family:Arial; background:#f0f2f5; }

.container { display:flex; height:100vh; }

/* 左侧 */
.sidebar {
  width:260px;
  background:#1e1e2f;
  color:white;
  display:flex;
  flex-direction:column;
}

.sidebar h2 { text-align:center; margin:20px 0; }

.new-chat {
  margin:10px;
  padding:10px;
  background:#10a37f;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.chat-history {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.chat-item {
  padding:8px;
  background:rgba(255,255,255,0.1);
  margin-bottom:5px;
  border-radius:6px;
  cursor:pointer;
}

/* 主体 */
.main { flex:1; display:flex; flex-direction:column; }

.header {
  padding:15px;
  background:white;
  border-bottom:1px solid #ddd;
}

/* 聊天 */
.chat-container {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

.chat-message { display:flex; margin:10px 0; }

.user { justify-content:flex-end; }
.ai { justify-content:flex-start; }

.chat-bubble {
  max-width:70%;
  padding:12px;
  border-radius:14px;
}

.user .chat-bubble { background:#10a37f; color:white; }
.ai .chat-bubble { background:#f5f5f5; }

/* 输入框 GPT风格 */
.input-container {
  padding:10px;
  background:white;
  border-top:1px solid #ddd;
}

.input-box {
  display:flex;
  border:1px solid #ddd;
  border-radius:12px;
  padding:10px;
}

textarea {
  flex:1;
  border:none;
  outline:none;
  resize:none;
}

.send-btn {
  background:#10a37f;
  border:none;
  color:white;
  border-radius:8px;
  padding:8px 12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- 左侧 -->
<div class="sidebar">
  <h2>答而有据</h2>
  <button class="new-chat" onclick="newChat()">+ 新对话</button>
  <button class="new-chat" onclick="clearHistory()">清空历史</button>

  <div class="chat-history" id="chat-history"></div>
</div>

<!-- 主体 -->
<div class="main">

<div class="header">
  <h3 id="chat-title">新对话</h3>
</div>

<div class="chat-container" id="chat-container"></div>

<div class="input-container">
  <div class="input-box">
    <textarea id="input" rows="1" placeholder="输入问题..."></textarea>
    <button class="send-btn" onclick="send()">➤</button>
  </div>
</div>

</div>
</div>

<script>
// ===== 用户系统 =====
const user = localStorage.getItem("currentUser");
if (!user) location.href = "login.html";

// ===== 数据 =====
let chats = JSON.parse(localStorage.getItem("chats_" + user)) || [];
let current = localStorage.getItem("current_" + user);

// ===== DOM =====
const chatBox = document.getElementById("chat-container");
const historyBox = document.getElementById("chat-history");
const input = document.getElementById("input");

// ===== 渲染 =====
function render() {
  chatBox.innerHTML = "";
  if (current === null || !chats[current]) return;

  chats[current].messages.forEach(m => {
    let div = document.createElement("div");
    div.className = "chat-message " + m.role;

    let bubble = document.createElement("div");
    bubble.className = "chat-bubble";
    bubble.innerHTML = m.content.replace(/\n/g,"<br>");

    div.appendChild(bubble);
    chatBox.appendChild(div);
  });

  chatBox.scrollTop = chatBox.scrollHeight;
}

function renderHistory() {
  historyBox.innerHTML = "";
  chats.forEach((c,i)=>{
    let d=document.createElement("div");
    d.className="chat-item";
    d.innerText=c.title || "新对话";
    d.onclick=()=>{current=i; save(); render(); renderHistory();}
    historyBox.appendChild(d);
  });
}

// ===== 存储 =====
function save(){
  localStorage.setItem("chats_"+user,JSON.stringify(chats));
  localStorage.setItem("current_"+user,current);
}

// ===== 聊天 =====
function newChat(){
  chats.push({title:null,messages:[]});
  current=chats.length-1;
  save(); render(); renderHistory();
}

function add(role,text){
  if(current===null) newChat();

  let chat=chats[current];
  chat.messages.push({role,content:text});

  if(!chat.title && role==="user"){
    chat.title=text.slice(0,10);
  }

  save();
  render();
  renderHistory();
}

// ===== 发送 =====
async function send(){
  let text=input.value.trim();
  if(!text) return;

  input.value="";
  add("user",text);

  let aiMsg="";
  add("ai","");
  let idx=chats[current].messages.length-1;

  const res = await fetch("http://127.0.0.1:8000/chat_stream",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:text})
  });

  const reader=res.body.getReader();
  const decoder=new TextDecoder();

  while(true){
    const {done,value}=await reader.read();
    if(done) break;

    aiMsg+=decoder.decode(value);
    chats[current].messages[idx].content=aiMsg;
    save();
    render();
  }
}

// ===== 清空 =====
function clearHistory(){
  if(!confirm("确定删除所有记录？")) return;
  localStorage.removeItem("chats_"+user);
  chats=[]; current=null;
  render(); renderHistory();
}

// ===== 输入行为（GPT风格）=====
input.addEventListener("keydown",e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

// ===== 初始化 =====
render();
renderHistory();
</script>

</body>
</html>
